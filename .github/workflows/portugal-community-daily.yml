name: Portugal community daily

on:
  schedule:
    # 07:00 UTC — свежие сигналы до утреннего трафика EU
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: portugal-community-daily
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: parser/requirements.txt

      - name: Install dependencies
        run: |
          npm ci
          pip install -r parser/requirements.txt

      - name: Daily parser → ingest → drafts
        run: npm run portugal:daily
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
          COMMUNITY_INGEST_API_KEY: ${{ secrets.COMMUNITY_INGEST_API_KEY }}
          EMIGRO_NEWS_FAST_MODEL: gemini-2.5-flash
